<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Espace administrateur</title>
{% include "_head_fonts.html" %}
</head>
<body>
<div class="wrap">
  <div class="card">
    <span class="beacon"><span class="dot"></span> Accès restreint</span>
    <h1>Espace administrateur</h1>
    <form action="/gestion-privee/connexion" method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus>
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" class="btn-block">Se connecter</button>
    </form>
    {% if erreur %}<p class="erreur">{{ erreur }}</p>{% endif %}
  </div>
</div>
</body>
</html>
